<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In – HoyJob</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;900&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>

<body>

  <nav class="site-nav"></nav>

  <div class="auth-page">
    <div class="  auth-card">
      <h1>Welcome Back</h1>
      <p class="subtitle">Log in to your HoyJob account</p>

      <div id="auth-error"
        style="display:none; background:#f8d7da; color:#721c24; padding:10px 14px; border-radius:8px; font-size:0.85rem; margin-bottom:1rem;">
      </div>

      <div id="auth-success"
        style="display:none; background:#d4edda; color:#155724; padding:10px 14px; border-radius:8px; font-size:0.85rem; margin-bottom:1rem;">
      </div>

      <div class="role-toggle">
        <input type="radio" name="role" value="agent" id="role-agent" checked>
        <label for="role-agent">I'm an Agent</label>
        <input type="radio" name="role" value="recruiter" id="role-recruiter">
        <label for="role-recruiter">I'm a Recruiter</label>
      </div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" class="form-input" placeholder="Enter password" required>
        </div>
        <button type="submit" id="login-btn" class="btn btn-primary btn-lg" style="width:100%; margin-top:0.5rem;">Log In</button>
      </form>

      <div class="auth-link">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </div>
      <div class="auth-footer">© 2026 HoyJob Inc.</div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/global.js"></script>
  <script src="../js/auth.js"></script>
</body>

</html>
