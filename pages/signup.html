<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – HoyJob</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;900&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>

<body>

  <nav class="site-nav"></nav>

  <div class="auth-page">
    <div class="auth-card">
      <h1>Create Account</h1>
      <p class="subtitle">Join HoyJob and start hiring smarter</p>

      <div id="auth-error"
        style="display:none; background:#f8d7da; color:#721c24; padding:10px 14px; border-radius:8px; font-size:0.85rem; margin-bottom:1rem;">
      </div>

      <div id="auth-success" class="auth-success-state" style="display:none;">
        <div class="success-icon">✉️</div>
        <h2 id="success-title">Check your inbox!</h2>
        <p id="success-msg">Verification mail sent. Please check your inbox.</p>
        <a href="login.html" class="btn btn-primary" style="display:inline-block; margin-top:1.5rem; text-decoration:none;">Go to Login</a>
      </div>

      <div class="role-toggle">
        <input type="radio" name="role" value="agent" id="role-agent" checked>
        <label for="role-agent">I'm an Agent</label>
        <input type="radio" name="role" value="recruiter" id="role-recruiter">
        <label for="role-recruiter">I'm a Recruiter</label>
      </div>

      <form id="signup-form" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label for="signup-name">Full Name</label>
          <input type="text" id="signup-name" class="form-input" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" class="form-input" placeholder="Create a password" required>
        </div>
        <button type="submit" id="signup-btn" class="btn btn-primary btn-lg" style="width:100%; margin-top:0.5rem;">Create
          Account</button>
      </form>


      <div class="auth-link">
        Already have an account? <a href="login.html">Log In</a>
      </div>
      <div class="auth-footer">© 2026 HoyJob Inc.</div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/global.js"></script>
  <script src="../js/auth.js"></script>
</body>

</html>
