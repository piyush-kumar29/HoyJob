<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – HoyJob</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;900&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>

<body>

  <nav class="site-nav"></nav>

  <div class="auth-page">
    <div class="auth-card">
      <h1>Create Account</h1>
      <p class="subtitle">Join HoyJob and start hiring smarter</p>

      <div id="auth-error"
        style="display:none; background:#f8d7da; color:#721c24; padding:10px 14px; border-radius:8px; font-size:0.85rem; margin-bottom:1rem;">
      </div>

      <div id="auth-success"
        style="display:none; background:#d4edda; color:#155724; padding:10px 14px; border-radius:8px; font-size:0.85rem; margin-bottom:1rem;">
      </div>

      <div id="clerk-signup"></div>

      <div class="auth-link">
        Already have an account? <a href="login.html">Log In</a>
      </div>
      <div class="auth-footer">© 2026 HoyJob Inc.</div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/global.js"></script>
  <script src="../js/auth.js"></script>
</body>

</html>
